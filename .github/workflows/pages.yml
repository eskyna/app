name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Prepare static Pages artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check required files
        run: |
          set -euo pipefail
          required=(
            index.html
            app.js
            styles.css
            sw.js
            manifest.webmanifest
            config.example.js
          )
          for file in "${required[@]}"; do
            test -f "$file" || { echo "Missing required file: $file"; exit 1; }
          done

      - name: Prepare site
        run: |
          set -euo pipefail
          mkdir -p _site
          cp index.html app.js styles.css sw.js manifest.webmanifest sample-api-response.json _site/
          cp -r assets _site/
          if [ -f config.js ]; then
            cp config.js _site/
          else
            cp config.example.js _site/config.js
          fi
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
